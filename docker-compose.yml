x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - nanobot_data:/root/.nanobot

services:
  nanobot-gateway:
    container_name: nanobot-gateway
    <<: *common-config
    command: ["gateway"]
    restart: unless-stopped
    ports:
      - 18790:18790
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
  
  nanobot-cli:
    <<: *common-config
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true

volumes:
  nanobot_data:
    driver_opts:
      o: bind
      device: /mnt/d/DockerVolume/nanobot_data
      type: none