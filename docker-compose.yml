x-common-config: &common-config
  image: van-nanobot:latest
  build:
    context: .
    dockerfile: Dockerfile
    secrets:
      - zscaler_cert
  volumes:
    - nanobot_data:/root/.nanobot

services:
  nanobot-gateway:
    container_name: nanobot-gateway
    <<: *common-config
    command: ["gateway"]
    restart: unless-stopped
    ports:
      - 18790:18790
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
  
  nanobot-cli:
    <<: *common-config
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true

volumes:
  nanobot_data:
    driver_opts:
      o: bind
      # Override via .env if you don't want a hard-coded host path.
      # Example .env:
      #   NANOBOT_DATA_DEVICE=D:\\DockerVolume\\nanobot_data
      device: ${NANOBOT_DATA_DEVICE:-/mnt/d/DockerVolume/nanobot_data}
      type: none

secrets:
  zscaler_cert:
    # Prefer a local, untracked cert at repo root. Override via .env if needed.
    # Example .env: ZSCALER_CERT_FILE=C:\Users\you\Downloads\zscaler.crt
    file: ${ZSCALER_CERT_FILE:-./zscaler.crt}